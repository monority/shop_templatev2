<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6366f1" />

  <!-- SEO -->
  <meta name="description" content="SNEAKARA - Premium sneakers shop. Discover the latest collection of Nike, Adidas, Puma, and more. Free shipping on orders over $200." />
  <meta name="keywords" content="sneakers, shoes, Nike, Adidas, Puma, Reebok, running shoes, lifestyle, streetwear" />
  <meta name="author" content="SNEAKARA" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://sneakara.com" />

  <!-- Security -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- Open Graph -->
  <meta property="og:title"       content="SNEAKARA — Premium Sneakers" />
  <meta property="og:description" content="Discover the latest collection of premium sneakers. Free shipping on orders over $200." />
  <meta property="og:type"        content="website" />
  <meta property="og:image"       content="https://sneakara.com/og-image.jpg" />
  <meta property="og:url"         content="https://sneakara.com" />
  <meta property="og:site_name"   content="SNEAKARA" />
  <meta property="og:locale"      content="en_US" />

  <!-- Twitter -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="SNEAKARA — Premium Sneakers" />
  <meta name="twitter:description" content="Discover the latest collection of premium sneakers. Free shipping on orders over $200." />
  <meta name="twitter:image"       content="https://sneakara.com/og-image.jpg" />

  <title>SNEAKARA — Premium Sneakers Shop</title>

  <!-- Fonts — preconnect pour réduire la latence -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- display=swap évite le FOIT (flash of invisible text) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Preload hero image LCP -->

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "SNEAKARA",
    "url": "https://sneakara.com",
    "logo": "https://sneakara.com/og-image.jpg",
    "description": "Premium sneakers shop — Nike, Adidas, Puma, Reebok and more.",
    "sameAs": [],
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer service",
      "email": "support@sneakara.com"
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/Main.jsx"></script>
</body>

</html>
